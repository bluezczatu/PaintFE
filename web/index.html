<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>PaintFE - Web</title>
  <link rel="icon" href="./app_icon.png" />
  <style>
    html, body { margin: 0; height: 100%; background: #111114; overscroll-behavior: none; }
    canvas { width: 100%; height: 100vh; display: block; }

    /* ---- Loading screen ----
       Mirrors the app's default dark "Signal" theme (see src/theme.rs) so
       the transition into the real UI doesn't pop: deep near-black
       background, burnt-orange accent, DM Sans-style system font stack. */
    #paintfe-loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: #111114;
      color: #e8e8f0;
      font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      z-index: 1000;
      transition: opacity 0.35s ease;
    }
    #paintfe-loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #paintfe-loading img {
      width: 64px;
      height: 64px;
      filter: drop-shadow(0 0 18px rgba(232, 89, 12, 0.45));
    }
    #paintfe-loading .title {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #e8e8f0;
    }
    #paintfe-loading .subtitle {
      font-size: 13px;
      color: #7a7a90;
      min-height: 16px;
    }
    #paintfe-loading .subtitle.error {
      color: #f97316;
    }
    /* Indeterminate progress bar — trunk doesn't expose real byte progress
       for the wasm download without extra JS instrumentation, so this shows
       activity rather than a precise percentage. */
    #paintfe-loading .bar-track {
      width: 220px;
      height: 3px;
      border-radius: 2px;
      background: #232d2d;
      overflow: hidden;
    }
    #paintfe-loading .bar-fill {
      width: 40%;
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, #e8590c, #f97316);
      animation: paintfe-loading-slide 1.1s ease-in-out infinite;
    }
    @keyframes paintfe-loading-slide {
      0%   { transform: translateX(-120%); }
      100% { transform: translateX(340%); }
    }
  </style>
</head>
<body>
  <div id="paintfe-loading">
    <img src="./app_icon.png" alt="" />
    <div class="title">PaintFE - Web</div>
    <div class="bar-track"><div class="bar-fill"></div></div>
    <div class="subtitle" id="paintfe-loading-status">Loading… (experimental beta)</div>
  </div>
  <canvas id="the_canvas_id"></canvas>
  <script>
    window.addEventListener("error", (e) => console.error("windowerror", e.message));
    window.addEventListener("unhandledrejection", (e) => console.error("unhandled", e.reason));

    const loadingEl = document.getElementById("paintfe-loading");
    const statusEl = document.getElementById("paintfe-loading-status");

    addEventListener("TrunkApplicationStarted", async () => {
      try {
        const handle = new window.wasmBindings.WebHandle();
        await handle.start(document.getElementById("the_canvas_id"));
        console.log("PaintFE Web started ok");
        loadingEl.classList.add("hidden");
        setTimeout(() => loadingEl.remove(), 400);
      } catch (e) {
        console.error("PaintFE Web failed to start", e);
        statusEl.textContent = "Failed to start. Try reloading the page.";
        statusEl.classList.add("error");
      }
    });
  </script>
  <link data-trunk rel="rust" data-wasm-opt="0" />
  <link data-trunk rel="copy-file" href="../assets/icons/app_icon.png" />
</body>
</html>
